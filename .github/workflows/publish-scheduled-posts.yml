name: Publish scheduled blog posts

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for posts ready to publish
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          CHANGED=0

          for file in src/content/blog/*.mdx; do
            [ -f "$file" ] || continue

            # Check if post has draft: true AND a publishDate <= today
            DRAFT=$(grep -m1 '^draft:' "$file" | awk '{print $2}')
            PUB_DATE=$(grep -m1 '^publishDate:' "$file" | awk '{print $2}' | tr -d '"')

            if [ "$DRAFT" = "true" ] && [ -n "$PUB_DATE" ] && [ "$PUB_DATE" \<= "$TODAY" ]; then
              echo "Publishing: $file (publishDate: $PUB_DATE)"
              # Flip draft: true to draft: false
              sed -i "s/^draft: true/draft: false/" "$file"
              CHANGED=1
            fi
          done

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git commit -m "Publish scheduled blog posts for $(date -u +%Y-%m-%d)"
          git push
